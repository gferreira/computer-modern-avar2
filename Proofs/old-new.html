<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <title>Computer Modern Variable</title>
    <style>
      /* reference font */
      @font-face {
        font-family: "Computer Modern 1";
        src: url('../Fonts/ComputerModern-Roman.ttf') format('truetype');
        font-style: normal;
        font-weight: normal;
      }
      @font-face {
        font-family: "Computer Modern 1";
        src: url('../Fonts/ComputerModern-Italic.ttf') format('truetype');
        font-style: italic;
        font-weight: normal;
      }
      .ComputerModern_1 {
        font-family: "Computer Modern 1";
      }
      /* avar2 font */
      @font-face {
        font-family: "Computer Modern 2";
        src: url('../Fonts/ComputerModern-Roman_avar2.ttf') format('truetype');
        font-style: normal;
        font-weight: normal;
      }
      @font-face {
        font-family: "Computer Modern 2";
        src: url('../Fonts/ComputerModern-Italic_avar2.ttf') format('truetype');
        font-style: italic;
        font-weight: normal;
      }
      .ComputerModern_2 {
        font-family: "Computer Modern 2";
      }

      .sample {
        font-size: 120pt;
        line-height: 1.0em;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-optical-sizing: none;
        font-kerning: none;
        columns: 1;
      }
      ._hide {
        display: none;
      }
      ._roman {
        font-style: normal;
      }
      ._italic {
        font-style: italic;
      }
      output.form-control {
        font-size: 0.85em !important;
      }
    </style>
  </head>
  <body class='h-100 overflow-hidden'>
    <div class='container-fluid p-3'>
      <div class="row">
        <div class="col-6 col-sm-5 col-md-4 col-lg-3 col-xxl-2">
          
          <hr/>

          <!-- display options -->

          <div class="row">
            <div class="col-4">
              <label for="colormode" class="form-label"><small>color mode</small></label>
            </div>
            <div class="col-8">
              <select id='colormode' class="form-select-sm w-100" aria-label="select mode">
                <option value="light">light</option>
                <option value="dark" selected>dark</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div class="col-4">
              <label for="fontstyle" class="form-label"><small>font style</small></label>
            </div>
            <div class="col-8">
              <select id="fontstyle" class="form-select-sm w-100" aria-label="select style">
                <option value="roman" selected>Roman</option>
                <option value="italic">Italic</option>
              </select>
            </div>
          </div>

          <hr/>

          <!-- text properties -->

          <div class="row">
            <div class="col-4">
              <label for="fontsize" class="form-label"><small>font size</small></label>
            </div>
            <div class="col-6">
              <input type="range" class="form-range" min="5" max="288" value='120' id="fontsize">
            </div>
            <div class="col-2">
              <output class="form-control border-0 bg-transparent" id='fontsize_value'>120</output>
            </div>
          </div>

          <div class="row">
            <div class="col-4">
              <label for="lineheight" class="form-label"><small>line height</small></label>
            </div>
            <div class="col-6">
              <input type="range" class="form-range" min="1.00" max="1.60" value='1.00' step="0.05" id="lineheight">
            </div>
            <div class="col-2">
              <output class="form-control border-0 bg-transparent" id='lineheight_value'>1.00</output>
            </div>
          </div>

          <div class="row">
            <div class="col-4">
              <label for="columns" class="form-label"><small>columns</small></label>
            </div>
            <div class="col-6">
              <input type="range" class="form-range" min="1" max="3" value='1' id="columns">
            </div>
            <div class="col-2">
              <output class="form-control border-0 bg-transparent" id='columns_value'>1</output>
            </div>
          </div>
          <hr/>

          <!-- blended axes -->

          <div class="row">
            <div class="col-4">
              <label for="opsz" class="form-label"><small>optical size</small></label>
            </div>
            <div class="col-6">
              <input type="range" class="form-range axis" min="5" max="17" value='10' id="opsz">
            </div>
            <div class="col-2">
              <output class="form-control border-0 bg-transparent" id='opsz_value'><small>10</small></output>
            </div>
          </div>

          <div class="row">
            <div class="col-4">
              <label for="opsz" class="form-label"><small>weight</small></label>
            </div>
            <div class="col-6">
              <input type="range" class="form-range axis" min="400" max="700" value='400' step='10' id="wght">
            </div>
            <div class="col-2">
              <output class="form-control border-0 bg-transparent" id='wght_value'><small>400</small></output>
            </div>
          </div>

          <hr/>

        </div>

        <div class="col-6 col-sm-7 col-md-8 col-lg-9 col-xxl-10 vh-100 position-relative">
          <div class="w-100 clearfix pe-3 position-absolute top-0 start-0 vh-50 pt-3 ms-3 overflow-hidden">
            <span class="badge bg-primary float-end me-1">new</span>
            <p id='sample_1' class='sample w-100 ComputerModern_2 _roman' contenteditable="true">
              <span>HODHVHTH<br/>nondnpnvn.n</span>
            </p>
          </div>
          <div class="w-100 clearfix pe-3 position-absolute top-50 start-0 vh-50 pt-3 ms-3 border-top border-secondary overflow-hidden bg-body" id='avar1_container'>
            <span class="badge bg-primary float-end me-2">old</span>
            <p id='sample_2' class='sample w-100 ComputerModern_1 _roman'>
              <span>HODHVHTH<br/>nondnpnvn.n</span>
            </p>
          </div>
        </div>

      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function() {

        // get UI elements

        fontsize_slider     = document.getElementById("fontsize");
        lineheight_slider   = document.getElementById("lineheight");
        columns_slider      = document.getElementById("columns");
        colormode_selector  = document.getElementById("colormode");
        fontstyle_selector  = document.getElementById("fontstyle");
        font_samples        = document.querySelectorAll(".sample");
        axis_sliders        = document.querySelectorAll('.axis')
        sample_1            = document.getElementById('sample_1')
        sample_2            = document.getElementById('sample_2')

        // define UI behavior

        function axis_sliders_changed() {
          var variations = [];
          axis_sliders.forEach(function(slider) {
            variations.push('"' + slider.id + '" ' + slider.value);
            document.getElementById(slider.id + '_value').value = slider.value;
          })
          for (var i = 0; i < font_samples.length; i++) {
            font_samples[i].style.fontVariationSettings = variations.join(", ")
          }
        }

        function fontsize_slider_changed() {
          document.getElementById('fontsize_value').value = fontsize_slider.value;
          for (var i = 0; i < font_samples.length; i++) {
            font_samples[i].style.fontSize = fontsize_slider.value + "pt"
            font_samples[i].style.lineHeight = (fontsize_slider.value * lineheight_slider.value) + "pt"
          }
        }

        function lineheight_slider_changed() {
          document.getElementById('lineheight_value').value = lineheight_slider.value;
          for (var i = 0; i < font_samples.length; i++) {
            font_samples[i].style.lineHeight = (fontsize_slider.value * lineheight_slider.value) + "pt"
          }
        }

        function columns_slider_changed() {
          document.getElementById('columns_value').value = columns_slider.value;
          for (var i = 0; i < font_samples.length; i++) {
            font_samples[i].style.columns = columns_slider.value
          }
        }

        function fontstyle_changed() {
          var fontstyle = fontstyle_selector.value;
          if (fontstyle == 'italic') {
            $('.sample').removeClass('_roman');
            $('.sample').addClass('_italic');
          } else {
            $('.sample').removeClass('_italic');
            $('.sample').addClass('_roman');
          }
        }

        function colormode_changed() {
          var colormode = colormode_selector.value;
          if (colormode == 'dark') {
              document.documentElement.setAttribute('data-bs-theme','dark')
          } else {
              document.documentElement.setAttribute('data-bs-theme','light')
          }
        }

        // bind behavior to elements

        fontsize_slider.addEventListener('input', fontsize_slider_changed)
        lineheight_slider.addEventListener('input', lineheight_slider_changed)
        columns_slider.addEventListener('input', columns_slider_changed)
        colormode_selector.addEventListener('input', colormode_changed)
        fontstyle_selector.addEventListener('input', fontstyle_changed)

        axis_sliders.forEach(function(slider) {
          slider.addEventListener('input', axis_sliders_changed)
        })

        sample_1.addEventListener("input", function() {
          sample_2.innerHTML = sample_1.innerHTML;
        }, false);

      })
    </script>

  </body>
</html>
